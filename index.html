<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>名人对谈 | 时光圆桌</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/salon.css">
</head>
<body>

  <!-- =========================================
       加载遮罩
       ========================================= -->
  <div id="loading-curtain" class="loading-curtain">
    <div class="loading-orb-enhanced">
      <div class="loading-center"></div>
    </div>
    <div class="loading-cast" id="loading-cast">
      <div class="loading-dot" data-index="0"></div>
      <div class="loading-dot" data-index="1"></div>
      <div class="loading-dot" data-index="2"></div>
      <div class="loading-dot" data-index="3"></div>
      <div class="loading-dot" data-index="4"></div>
      <div class="loading-dot" data-index="5"></div>
      <div class="loading-dot" data-index="6"></div>
    </div>
    <div class="loading-subtitle" style="margin-top: 12px; font-size: 0.75rem; color: #6a5a4a; letter-spacing: 0.05em;">本页面所有对话由 AI 生成模拟，仅为创意表达</div>
    <div id="loading-text" class="loading-text">八位思想家正在落座……</div>
  </div>

  <!-- =========================================
       首页（Landing）
       ========================================= -->
  <section id="page-landing" class="page-section active">
    <div class="landing-container">
      <div class="landing-logo">
        <img src="logo.png" alt="名人对谈" class="logo-img">
      </div>
      <h1 class="landing-title">名人对谈</h1>
      <p class="landing-subtitle">
        八位穿越时空的思想家，围坐在一张圆桌旁。<br>
        你问一个问题，他们各自作答。
      </p>
      <div class="landing-divider"></div>
      
      <div class="mode-selection">
        <button id="btn-roundtable" class="mode-btn">
          <span class="mode-btn-icon">◈</span>
          <div class="mode-btn-title">圆桌会议</div>
          <div class="mode-btn-desc">
            八位名人同时回应你的问题，<br>
            然后你可以选择与其中一位深入对话
          </div>
        </button>
        
        <button id="btn-private" class="mode-btn">
          <span class="mode-btn-icon">◉</span>
          <div class="mode-btn-title">单人对谈</div>
          <div class="mode-btn-desc">
            选择一位名人，<br>
            与他/她进行一对一的深度交流
          </div>
        </button>
      </div>
    </div>
  </section>

  <!-- =========================================
       圆桌输入页
       ========================================= -->
  <section id="page-roundtable-input" class="page-section">
    <div class="page-topbar">
      <button class="back-btn" data-back>
        <span>←</span> 返回
      </button>
      <button class="end-btn" data-end>结束对话</button>
    </div>
    <div class="input-container">
      
      <h2 class="input-title">圆桌会议</h2>
      <p class="input-subtitle">八位思想家已落座，等待你的提问</p>
      
      <!-- 名人画廊 -->
      <div id="cast-gallery" class="cast-gallery"></div>
      
      <!-- 问题输入 -->
      <div class="question-area">
        <textarea
          id="question-input"
          class="question-input"
          placeholder="在这里写下你的问题……&#10;例如：什么是孤独？&#10;或：如何面对失败？"
        ></textarea>
        <button id="submit-roundtable" class="submit-btn">
          提出问题
        </button>
      </div>
    </div>
  </section>

  <!-- =========================================
       圆桌展示页
       ========================================= -->
  <section id="page-roundtable-show" class="page-section">
    <div class="page-topbar">
      <button class="back-btn" data-back>
        <span>←</span> 返回
      </button>
      <button class="end-btn" data-end>结束对话</button>
    </div>
    <div class="salon-stage">
      <div class="salon-header">
        <h2>时光圆桌</h2>
        <div class="user-question" id="roundtable-question"></div>
      </div>
      <div id="salon-stage"></div>
      <!-- Tesserae 共鸣测量 -->
      <div class="tesserae-resonance" id="tesserae-resonance" style="display:none;">
        <div class="tesserae-resonance-header">
          <span class="tesserae-icon">✦</span> 八人共鸣测量
        </div>
        <div class="tesserae-resonance-body" id="tesserae-resonance-body"></div>
        <button class="tesserae-close" id="tesserae-resonance-close">关闭</button>
      </div>
      <button class="tesserae-btn" id="btn-measure-resonance" style="display:none;">✦ 测量八人共鸣</button>
    </div>
  </section>

  <!-- =========================================
       单人对谈选择页
       ========================================= -->
  <section id="page-private-select" class="page-section">
    <div class="page-topbar">
      <button class="back-btn" data-back>
        <span>←</span> 返回
      </button>
      <button class="end-btn" data-end>结束对话</button>
    </div>
    <div class="input-container">
      <h2 class="input-title">选择一位对话者</h2>
      <p class="input-subtitle">你想与谁深入交流？</p>
      
      <div class="card-stack-container">
        <button class="card-stack-arrow card-stack-prev" id="card-stack-prev">‹</button>
        <div id="private-select-gallery" class="card-stack"></div>
        <button class="card-stack-arrow card-stack-next" id="card-stack-next">›</button>
      </div>
      <div class="card-stack-dots" id="card-stack-dots"></div>
    </div>
  </section>

  <!-- =========================================
       单人对谈页
       ========================================= -->
  <section id="page-private" class="page-section">
    <div class="page-topbar">
      <button class="back-btn" data-back>
        <span>←</span> 返回
      </button>
      <button class="end-btn" data-end>结束对话</button>
    </div>
    <div class="chat-container">
      <div class="chat-header" id="chat-header">
        <!-- 动态填充 -->
      </div>
      
      <div class="chat-messages" id="chat-messages"></div>
      
      <div class="chat-input-bar">
        <input
          type="text"
          id="private-input"
          placeholder="输入你的问题……"
          autocomplete="off"
        >
        <button id="tesserae-spark-btn" class="chat-spark-btn" title="灵感碎片">✦</button>
        <button id="send-private" class="chat-send-btn">发送</button>
      </div>
    </div>
  </section>

  <!-- =========================================
       API Key 设置弹窗
       ========================================= -->
  <div id="apikey-modal" class="modal-overlay" style="display:none;">
    <div class="modal-card">
      <h3 class="modal-title">设置 API Key</h3>
      <p class="modal-desc">
        名人对谈使用 Kimi（Moonshot AI）API 来生成对话内容。<br>
        你的 API Key 仅存储在本地浏览器中，不会发送到任何第三方服务器。
      </p>
      <input
        type="text"
        id="apikey-input"
        class="modal-input"
        placeholder="sk-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
        autocomplete="off"
      >
      <div class="modal-actions">
        <button id="apikey-save" class="submit-btn" style="margin:0;">保存</button>
        <a href="https://platform.moonshot.cn/" target="_blank" class="modal-link">还没有 API Key？</a>
      </div>
      <p class="modal-note">首次使用需要输入，后续自动读取。</p>
    </div>
  </div>

  <!-- Tesserae 灵感弹窗 -->
  <div id="tesserae-modal" class="tesserae-modal" style="display:none;">
    <div class="tesserae-modal-backdrop"></div>
    <div class="tesserae-modal-card">
      <div class="tesserae-modal-header">
        <span class="tesserae-icon">✦</span>
        <span id="tesserae-modal-title">灵感碎片</span>
        <button class="tesserae-modal-close" id="tesserae-modal-close">✕</button>
      </div>
      <div class="tesserae-modal-body" id="tesserae-modal-body">
        <!-- 动态内容 -->
      </div>
      <div class="tesserae-modal-compose">
        <textarea 
          id="tesserae-compose-input" 
          class="tesserae-compose-input"
          placeholder="在这里写下你想问的问题……"
          rows="3"
        ></textarea>
      </div>
      <div class="tesserae-modal-actions">
        <button class="tesserae-action-btn" id="tesserae-refresh-btn">✦ 再来一次</button>
        <button class="tesserae-action-btn primary" id="tesserae-send-btn">发送给名人</button>
      </div>
    </div>
  </div>

  <script src="js/tesserae.js"></script>
  <script src="js/roundtable.js"></script>
</body>
</html>
